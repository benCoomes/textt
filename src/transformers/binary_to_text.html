<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles.css">
  <title>textt</title>
</head>

<body>
  <main>
    <h1><a href="../index.html">textt</a></h1>

    <h2>Binary to Text</h2>
    <p>This transformer displays the characters represented by a space-delimited list of <a href="https://en.wikipedia.org/wiki/Binary_code">8-bit binary strings</a>.</p>
    
    <label for="input-plaintext">Binary</label>    
    <textarea id="input-plaintext" class="textt-input" placeholder="Enter binary here" rows="5" cols="80"></textarea>
    
    <label for="input-modifiedtext">Text</label>
    <textarea id="input-modifiedtext" class="textt-input" rows="5" cols="80" readonly="true"></textarea>
  </main>
</body>

</html>

<script src="binary_to_text.js"></script>
